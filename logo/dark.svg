<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128" role="img" aria-label="Quanterios alt mark B1 v2 — lattice cell with quantum + AI cues">
  <title>Quanterios — lattice cell mark (v2)</title>
  <desc>Primary lattice cell with a rotated ghost lattice behind (superposition / quasicrystal → quantum cue) and a concentric dual-ring center node (reasoning core → AI cue). Cryptographic lattice remains the dominant read.</desc>
  <defs>
    <linearGradient id="b1v2g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <radialGradient id="b1v2core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22D3EE"/>
      <stop offset="60%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#1E1B4B"/>
    </radialGradient>
  </defs>
  <rect width="128" height="128" fill="#0F172A"/>

  <!-- ghost lattice: rotated 30°, lower opacity, quasicrystal / superposition cue -->
  <g transform="rotate(30 64 64)" opacity="0.35">
    <g stroke="url(#b1v2g)" stroke-width="1.2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M64 28 L100 64 L64 100 L28 64 Z"/>
      <path d="M64 28 L64 100" opacity="0.5"/>
      <path d="M28 64 L100 64" opacity="0.5"/>
    </g>
    <g fill="url(#b1v2g)">
      <circle cx="64" cy="28" r="2.6"/>
      <circle cx="100" cy="64" r="2.6"/>
      <circle cx="64" cy="100" r="2.6"/>
      <circle cx="28" cy="64" r="2.6"/>
    </g>
  </g>

  <!-- primary lattice cell -->
  <g stroke="url(#b1v2g)" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M64 22 L106 64 L64 106 L22 64 Z"/>
    <path d="M64 22 L64 106" opacity="0.5"/>
    <path d="M22 64 L106 64" opacity="0.5"/>
    <path d="M43 43 L85 43 L85 85 L43 85 Z" opacity="0.35"/>
    <path d="M43 43 L85 85 M85 43 L43 85" opacity="0.2"/>
  </g>

  <!-- outer + inner nodes -->
  <g fill="url(#b1v2g)">
    <circle cx="64" cy="22" r="4.5"/>
    <circle cx="106" cy="64" r="4.5"/>
    <circle cx="64" cy="106" r="4.5"/>
    <circle cx="22" cy="64" r="4.5"/>
    <circle cx="43" cy="43" r="2.6" opacity="0.85"/>
    <circle cx="85" cy="43" r="2.6" opacity="0.85"/>
    <circle cx="85" cy="85" r="2.6" opacity="0.85"/>
    <circle cx="43" cy="85" r="2.6" opacity="0.85"/>
  </g>

  <!-- concentric center node: AI reasoning core -->
  <g>
    <circle cx="64" cy="64" r="9" fill="none" stroke="url(#b1v2g)" stroke-width="1" stroke-opacity="0.55"/>
    <circle cx="64" cy="64" r="6.2" fill="url(#b1v2core)"/>
    <circle cx="64" cy="64" r="2.2" fill="#F8FAFC"/>
  </g>
</svg>
