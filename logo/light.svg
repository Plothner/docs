  <!-- Wordmark — tightened gap -->
  <text x="104" y="78" font-family="Inter, 'IBM Plex Sans', system-ui, -apple-system, sans-serif" font-size="54" font-weight="600" letter-spacing="-1.5" fill="#0F172A">quanterios</text>
  <text x="106" y="104" font-family="Inter, 'IBM Plex Sans', system-ui, sans-serif" font-size="14" font-weight="400" letter-spacing="2" fill="#475569">CRYPTOGRAPHY, MANAGED.</text>
